# ─── PIPELINE SÉQUENTIEL (architecture non-négociable) ──────────────────────

pipeline:
  sequence:
    - step: 1
      name: "MIF-DQF"
      question: "Ces données sont-elles physiquement valides ?"
      gate: "PASS ou WARNING — FAIL/VOID = chaîne arrêtée"
      package: "mif-dqf (PyPI) v1.2.0.post1"
      status: "STABLE — 224/224 tests"

    - step: 2
      name: "MIF-DAL"
      question: "Peut-on assembler un stream certifié depuis les sources disponibles ?"
      gate: "DALHandoff émis — DALHandoffError si impossible"
      package: "mif-dal (PyPI) v0.1.0 — PRÊT POUR PUBLICATION"
      status: "65/65 adversarial PASS · 169/177 pytest (8 skips réseau légitimes) · coverage ≥ 80%"
      note: "Un appel par actif. Le caller assemble PAXG-USD + BTC-USD séparément (D-DAL-007)."

    - step: 3
      name: "QS-PAF"
      question: "Cette paire est-elle adaptée à cette classe de méthodes ?"
      gate: "HIERARCHIE_CONFIRMEE — STOP sinon (archiver, ne pas continuer)"
      package: "QAAF Studio uniquement — PAS PyPI (D-MIF-001)"
      status: "PROTOCOLE DOCUMENTÉ (PAF_Pair_Adequacy_Framework.md)"

    - step: 4
      name: "MIF-Core"
      question: "Les métriques mesurent-elles ce qu'elles prétendent mesurer ?"
      gate: "CERTIFIED / ARCHIVED / SUSPECT"
      package: "mif-core (PyPI) — NON COMMENCÉ"
      status: "EN ATTENTE — débloqué par mif-dal v0.1.0 (atteint)"
      note: "SignalData construit par le caller à partir de deux DALHandoff. MIF-Core ne connaît pas DALHandoff."

    - step: 5
      name: "QS-MÉTIS"
      question: "Le signal génère-t-il de la valeur OOS non triviale ?"
      gate: "Q1 + Q2 + Q3 — NON sinon"
      package: "QAAF Studio uniquement — PAS PyPI (D-MIF-002)"
      status: "PROTOCOLE DOCUMENTÉ (protocole_metis_2.1.md)"

