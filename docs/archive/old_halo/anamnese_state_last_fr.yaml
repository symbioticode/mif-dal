# ─── DÉCISIONS ARCHITECTURALES NON-RÉVOCABLES ──────────────────────────────────
# Claude Code ne modifie jamais cette section.

decisions_immuables:

  dqf_core:
    - id: D-DQF-001
      decision: "MIF-UID calculé sur raw data, jamais sur cleaned data"
      raison: "Préserve l'intégrité de traçabilité — raw data est l'ancrage"
      source: "decisions_dqf_v1_1.md · fermé"

    - id: D-DQF-002
      decision: "DQFMode est mandatory (CERTIFICATION | DIAGNOSTIC) — pas de valeur par défaut"
      raison: "Fail fast — toute certification non-déclarée est une erreur silencieuse"
      source: "decisions_dqf_v1_1.md · fermé"

    - id: D-DQF-003
      decision: "Ordre évaluation CORE → ADVISORY est non-contamination, pas convention"
      raison: "Si CORE échoue, ADVISORY n'est pas évaluable — données physiquement invalides"
      source: "dialogue PCCD × MIF 18/04/2026"

    - id: D-DQF-004
      decision: "Tuples Python interdits dans tout dict YAML-exporté"
      raison: "ConstructorError silencieux en prod — utiliser dict {start, end} à la place"
      source: "KB-003 · bug documenté"

    - id: D-DQF-005
      decision: "detect_calendar() : ordre Forex avant Crypto dans les tests de suffixe"
      raison: "EUR/USD détecté CRYPTO_24_7 si ordre inversé — bug de précédence"
      source: "KB-003 · bug documenté"

    - id: D-DQF-006
      decision: "Dépendances optionnelles (pyarrow, fastparquet) : @pytest.mark.skipif obligatoire"
      raison: "27 tests Parquet échoués en CI NixOS par ImportError non géré"
      source: "KB-003"

  dal_core:
    - id: D-DAL-001
      decision: "DAL est une vue, pas un conteneur — il n'appartient pas aux données"
      raison: "Séparation responsabilités : DAL assemble, DQF certifie, MIF-Core qualifie"
      source: "backlog PCCD × MIF 18/04/2026"

    - id: D-DAL-002
      decision: "DALHandoff est l'unique point de passage DAL → DQF → caller"
      raison: "Atomicité : soit stream certifié, soit exception — jamais état intermédiaire"
      source: "backlog PCCD × MIF 18/04/2026"

    - id: D-DAL-003
      decision: "DAL déclare dqf_version_target — migration DQF est opération explicite"
      raison: "Pas de couplage implicite entre versions MIF-DAL et MIF-DQF"
      source: "backlog PCCD × MIF 18/04/2026"

    - id: D-DAL-004
      decision: "C1 Stream Integrity reste c1_enabled: false jusqu'à DALHandoff stable"
      raison: "C1 ne peut être spécifiée sans handoff_timestamp + assembly_hash définis"
      source: "decisions_dqf_v1_1.md + backlog PCCD"

    - id: D-DAL-005
      decision: "DAL lève exception sur DQF FAIL/VOID. DAL transmet avec flag sur DQF WARNING."
      raison: |
        FAIL/VOID = données physiquement invalides — continuer est une erreur structurelle.
        WARNING = données dégradées mais utilisables — le caller a le contexte pour décider.
      source: "Session 2026-05-02 · validé Andrei"
      statut: "FERMÉ"

    - id: D-DAL-006
      decision: "assembly_hash calculé sur raw data AVANT calendar alignment et AVANT ffill"
      raison: |
        Cohérence avec D-DQF-001 : l'ancrage est toujours le stream brut.
        Séquence : fetch → hash(raw) → DQF(clean) → expose(cleaned).
      source: "Session 2026-05-02 · validé Andrei"
      statut: "FERMÉ"

    - id: D-DAL-007
      decision: "DAL assemble UN stream par appel (1 actif = 1 appel). Composition multi-actifs = responsabilité caller."
      raison: |
        Zéro couplage entre actifs dans la couche infrastructure.
        Deux certifications DQF indépendantes = tests plus rapides et reproductibles isolément.
      source: "Session 2026-05-05 · validé Andrei"
      statut: "FERMÉ"

    - id: D-DAL-008
      decision: "Kraken API : données disponibles uniquement sur les 12 derniers mois glissants."
      raison: |
        Contrainte API réelle documentée — pas un bug DAL.
        Tous les tests d'intégration Kraken utilisent start >= (today - 11 months).
        PAXG-USD bloqué sur Kraken pour les utilisateurs canadiens (maintenance permanente)
        → fallback Yahoo automatique.
      source: "KB-DAL-005 · KB-DAL-006 · validé empiriquement"
      statut: "FERMÉ"

  mif_core:
    - id: D-MIF-001
      decision: "QS-PAF est un protocole QAAF Studio — PAS un package mif-paf sur PyPI"
      source: "Session 2026-05-02"
      statut: "FERMÉ"

    - id: D-MIF-002
      decision: "QS-MÉTIS est un protocole QAAF Studio — PAS un package sur PyPI"
      source: "Session 2026-05-02"
      statut: "FERMÉ"

    - id: D-MIF-003
      decision: "MIF-Core v0.1 implémente Phase 0 + Phase 1 + Phase 2 uniquement. Phase 3 hors scope."
      source: "MIF_v5_KB_Lessons_from_QAAF_Studio.md · Section 1.3"
      statut: "FERMÉ"

    - id: D-MIF-004
      decision: "Le signal oracle vit dans tests/test_oracle.py, jamais dans mif_core/"
      source: "MIF_v5_KB_Lessons_from_QAAF_Studio.md · Section 3"
      statut: "FERMÉ"

    - id: D-MIF-005
      decision: "strategy_fn doit recalculer depuis r_pair. Closure sur allocations pré-calculées = bug détectable."
      source: "bug_make_strategy_fn().md"
      statut: "FERMÉ"

    - id: D-MIF-006
      decision: "MIF Phase 1 : critère de dominance relative (cnsr_strat > cnsr_bench), pas seuil absolu."
      source: "MIF_v5_KB_Lessons_from_QAAF_Studio.md · Section 7.1"
      statut: "FERMÉ"

